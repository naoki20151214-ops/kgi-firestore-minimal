<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>すべてのKGI一覧</title>
    <link rel="stylesheet" href="./stage-tone.css" />
    <link rel="stylesheet" href="./environment-mode.css" />
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0;
        padding: 14px;
        background: #f3f4f6;
        font-family: "Yu Gothic UI", "Hiragino Kaku Gothic ProN", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #111827;
      }
      * { box-sizing: border-box; }
      .container { width: 100%; max-width: 920px; margin: 0 auto; }
      .shell {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
        padding: 16px;
        display: grid;
        gap: 12px;
      }
      h1 { margin: 0; font-size: clamp(1.2rem, 2.2vw, 1.6rem); }
      .hint { margin: 0; color: #6b7280; font-size: 0.9rem; }
      .button {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        padding: 10px 16px;
        border-radius: 999px;
        background: var(--stage-accent);
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }
      .kgi-cards { display: grid; gap: 10px; }
      .kgi-card {
        border: 1px solid #dbe6fb;
        border-radius: 12px;
        padding: 12px;
        background: #fdfefe;
        display: grid;
        gap: 10px;
      }
      .kgi-name { margin: 0; font-size: 1.03rem; }
      .kgi-summary { margin: 0; color: #334155; font-size: 0.9rem; }
      .progress-group { display: grid; gap: 6px; }
      .progress-item { display: inline-flex; width: fit-content; padding: 4px 8px; border-radius: 999px; font-size: 0.8rem; font-weight: 600; }
      .progress-item.is-done { background: #ecfdf5; color: #166534; border: 1px solid #bbf7d0; }
      .progress-item.is-active { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
      .progress-item.is-pending { background: #f8fafc; color: #475569; border: 1px solid #e2e8f0; }
      .next-action { margin: 0; padding: 8px 10px; border-radius: 8px; background: #f8fafc; border: 1px solid #e2e8f0; font-size: 0.88rem; }
      .empty { border: 1px solid #dbe6fb; border-radius: 12px; padding: 16px; background: #fff; }
      @media (min-width: 700px) { body { padding: 24px; } .button { width: auto; } .shell { padding: 20px; } }
    </style>
  </head>
  <body class="page-stage-kgi" data-page-mode="all">
    <main class="container">
      <section class="shell stage-shell">
        <h1 class="stage-main-title">すべてのKGI一覧</h1>
        <p class="hint">比較や過去KGIの確認はこちらで行います。</p>
        <a class="button" href="./list.html">ホームに戻る</a>

        <p id="statusText" class="hint">読み込み中...</p>
        <section id="kgiCards" class="kgi-cards" hidden></section>
        <div id="emptyState" class="empty" hidden>まだKGIはありません。</div>
      </section>
    </main>

    <script type="module" src="./list.js"></script>
  </body>
</html>
