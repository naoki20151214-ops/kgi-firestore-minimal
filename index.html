<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KGI保存アプリ</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f7fb;
        color: #1f2937;
      }

      .card {
        width: min(92vw, 420px);
        background: #fff;
        border-radius: 14px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        padding: 24px;
      }

      h1 {
        font-size: 1.25rem;
        margin: 0 0 16px;
      }

      .field {
        display: grid;
        gap: 6px;
        margin-bottom: 14px;
      }

      label {
        font-weight: 600;
        font-size: 0.92rem;
      }

      input,
      select,
      button {
        font-size: 1rem;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #d1d5db;
      }

      button {
        border: none;
        background: #2563eb;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .hint {
        margin-top: 10px;
        font-size: 0.84rem;
        color: #6b7280;
      }

      .hint.error {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>KGIを1件保存</h1>

      <div class="field">
        <label for="kgiName">KGI名</label>
        <input id="kgiName" type="text" placeholder="例: 月間売上" required />
      </div>

      <div class="field">
        <label for="kgiTarget">目標値</label>
        <input id="kgiTarget" type="number" placeholder="例: 1000000" required />
      </div>

      <div class="field">
        <label for="kgiDeadline">期限</label>
        <input id="kgiDeadline" type="date" />
      </div>

      <div class="field">
        <label for="kgiEmoji">絵文字</label>
        <select id="kgiEmoji">
          <option value="🚀">🚀</option>
          <option value="🎯">🎯</option>
          <option value="💰">💰</option>
          <option value="📈">📈</option>
          <option value="🔥">🔥</option>
        </select>
      </div>

      <button id="saveButton" type="button">保存</button>
      <p id="statusText" class="hint"></p>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
