<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KGI保存アプリ</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        min-height: 100vh;
        padding: 12px;
        background: #f5f7fb;
        color: #1f2937;
      }

      .card {
        width: 100%;
        background: #fff;
        border-radius: 14px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        padding: 24px;
      }

      h1 {
        font-size: 1.25rem;
        margin: 0 0 16px;
      }

      .field {
        display: grid;
        gap: 6px;
        margin-bottom: 14px;
      }

      label {
        font-weight: 600;
        font-size: 0.92rem;
      }

      input,
      textarea,
      select,
      button {
        font-size: 1rem;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #d1d5db;
      }

      textarea {
        min-height: 96px;
        resize: vertical;
      }

      button {
        width: 100%;
        border: none;
        background: #2563eb;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }

      @media (min-width: 641px) {
        body {
          display: grid;
          place-items: center;
          padding: 24px;
        }

        .card {
          max-width: 420px;
        }
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .hint {
        margin-top: 10px;
        font-size: 0.84rem;
        color: #6b7280;
      }

      .hint.error {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>KGIを1件保存</h1>

      <div class="field">
        <label for="kgiName">KGI名</label>
        <input id="kgiName" type="text" placeholder="例: 月間売上" required />
      </div>

      <div class="field">
        <label for="kgiGoalText">ゴール説明</label>
        <textarea id="kgiGoalText" placeholder="例: 月末までに月間売上100万円を達成する"></textarea>
      </div>

      <div class="field">
        <label for="kgiDeadline">期限</label>
        <input id="kgiDeadline" type="date" />
      </div>

      <div class="field">
        <label for="kgiLevel">説明レベル</label>
        <select id="kgiLevel">
          <option value="easy">やさしく</option>
          <option value="normal" selected>ふつう</option>
          <option value="detailed">くわしく</option>
        </select>
      </div>

      <button id="saveButton" type="button">保存</button>
      <p id="statusText" class="hint"></p>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
