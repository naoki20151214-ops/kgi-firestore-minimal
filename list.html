<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KGI一覧</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 24px;
        background: #f5f7fb;
        color: #1f2937;
      }

      .container {
        width: min(96vw, 820px);
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 1.4rem;
      }

      .top-actions {
        margin-bottom: 16px;
      }

      .button {
        display: inline-block;
        padding: 10px 14px;
        border-radius: 10px;
        background: #2563eb;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
      }

      .hint {
        margin: 0 0 12px;
        color: #6b7280;
        font-size: 0.9rem;
      }

      .hint.error {
        color: #b91c1c;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
        border-radius: 12px;
        overflow: hidden;
      }

      th,
      td {
        text-align: left;
        padding: 12px;
        border-bottom: 1px solid #e5e7eb;
        font-size: 0.95rem;
      }

      th {
        background: #eef2ff;
        font-weight: 700;
      }

      tr:last-child td {
        border-bottom: none;
      }

      .empty {
        background: #fff;
        border-radius: 12px;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>KGI一覧</h1>

      <div class="top-actions">
        <a class="button" href="./index.html">新しいKGIを追加</a>
      </div>

      <p id="statusText" class="hint">読み込み中...</p>

      <table id="kgiTable" hidden>
        <thead>
          <tr>
            <th>emoji</th>
            <th>name</th>
            <th>target</th>
            <th>createdAt</th>
          </tr>
        </thead>
        <tbody id="kgiTableBody"></tbody>
      </table>

      <div id="emptyState" class="empty" hidden>まだKGIはありません。</div>
    </main>

    <script type="module" src="./list.js"></script>
  </body>
</html>
