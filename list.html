<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KGI一覧</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        font-family: "Yu Gothic UI", "Hiragino Kaku Gothic ProN", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 14px;
        background: #f7f4ee;
        color: #252525;
      }

      .container {
        width: 100%;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(1.2rem, 2.2vw, 1.6rem);
        font-weight: 600;
        letter-spacing: 0.04em;
      }

      .top-actions {
        display: grid;
        gap: 8px;
        margin-bottom: 18px;
      }

      .button {
        display: inline-flex;
        width: 100%;
        justify-content: center;
        align-items: center;
        padding: 10px 16px;
        border-radius: 999px;
        background: #2563eb;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
      }

      .hint {
        margin: 0 0 14px;
        color: #6b7280;
        font-size: 0.9rem;
      }

      .hint.error {
        color: #b91c1c;
      }

      .today-card {
        display: grid;
        gap: 8px;
        margin-bottom: 14px;
        padding: 14px;
        background: #fffdfa;
        border: 1px solid #ddd4c6;
        border-radius: 8px;
      }

      .today-label {
        margin: 0;
        font-size: 0.84rem;
        font-weight: 700;
        color: #6b7280;
      }

      .today-task-name {
        font-size: 1rem;
        line-height: 1.5;
      }

      .today-task-kpi {
        margin: 0;
        font-size: 0.92rem;
        color: #4b5563;
      }

      .today-task-button {
        margin-top: 4px;
      }

      .table-wrap {
        background: #fffdfa;
        border: 1px solid #ddd4c6;
        border-radius: 8px;
        padding: 8px;
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 620px;
      }

      th,
      td {
        text-align: left;
        padding: 14px 16px;
        border-bottom: 1px solid #e6ded2;
        font-size: 0.96rem;
        vertical-align: top;
      }

      th {
        font-weight: 700;
        color: #4b5563;
        letter-spacing: 0.04em;
      }

      td {
        line-height: 1.7;
        word-break: normal;
        overflow-wrap: anywhere;
        white-space: normal;
      }

      td a {
        color: #1f2937;
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      tr:last-child td {
        border-bottom: none;
      }

      .empty {
        background: #fffdfa;
        border: 1px solid #ddd4c6;
        border-radius: 8px;
        padding: 20px;
      }

      @media (min-width: 641px) {
        body {
          padding: clamp(16px, 3vw, 32px);
        }

        .container {
          max-width: 980px;
        }

        .button {
          width: auto;
        }
      }

      @media (max-width: 640px) {
        .table-wrap {
          padding: 0;
          border: none;
          background: transparent;
          overflow-x: visible;
        }

        table {
          min-width: 0;
        }

        thead {
          display: none;
        }

        tbody {
          display: grid;
          gap: 12px;
        }

        tr {
          display: flex;
          flex-direction: column;
          gap: 8px;
          padding: 14px;
          background: #fffdfa;
          border: 1px solid #ddd4c6;
          border-radius: 8px;
        }

        td {
          display: block;
          padding: 0;
          border-bottom: none;
          font-size: 0.92rem;
        }

        td::before {
          content: attr(data-label);
          display: block;
          margin-bottom: 2px;
          font-size: 0.78rem;
          font-weight: 700;
          color: #6b7280;
          letter-spacing: 0.04em;
        }

        td:nth-child(1) {
          order: 3;
        }

        td:nth-child(2) {
          order: 1;
        }

        td:nth-child(3) {
          order: 2;
        }

        td:nth-child(4) {
          order: 4;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>KGI一覧</h1>

      <div class="top-actions">
        <a class="button" href="./index.html">新しいKGIを追加</a>
      </div>

      <p id="statusText" class="hint">読み込み中...</p>

      <section class="today-card" id="todayTaskSection" hidden>
        <p class="today-label">今日やること</p>
        <strong id="todayTaskName" class="today-task-name">-</strong>
        <p id="todayTaskKpi" class="today-task-kpi">対象KPI: -</p>
        <a id="todayTaskLink" class="button today-task-button" href="./list.html">このTaskを見る</a>
      </section>

      <div class="table-wrap" id="tableWrap" hidden>
        <table id="kgiTable">
          <thead>
            <tr>
              <th>作成日</th>
              <th>KGI名</th>
              <th>ゴール</th>
              <th>期限</th>
            </tr>
          </thead>
          <tbody id="kgiTableBody"></tbody>
        </table>
      </div>

      <div id="emptyState" class="empty" hidden>まだKGIはありません。</div>
    </main>

    <script type="module" src="./list.js"></script>
  </body>
</html>
