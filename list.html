<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KGI一覧</title>
    <link rel="stylesheet" href="./stage-tone.css" />
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }

      body {
        font-family: "Yu Gothic UI", "Hiragino Kaku Gothic ProN", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 14px;
        background: #f3f4f6;
        color: #111827;
      }

      .container {
        width: 100%;
        max-width: 920px;
        margin: 0 auto;
      }

      .shell {
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
        padding: 16px;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(1.2rem, 2.2vw, 1.6rem);
        font-weight: 700;
      }

      .top-actions {
        display: grid;
        gap: 8px;
        margin-bottom: 14px;
      }

      .button {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        padding: 10px 16px;
        border-radius: 999px;
        background: var(--stage-accent);
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }

      .button:hover {
        background: var(--stage-accent-strong);
      }

      .hint {
        margin: 0 0 12px;
        color: #6b7280;
        font-size: 0.9rem;
      }

      .hint.error { color: #b91c1c; }

      .today-card {
        display: grid;
        gap: 8px;
        margin-bottom: 14px;
        padding: 14px;
        background: var(--stage-soft);
        border: 1px solid var(--stage-soft-border);
        border-radius: 12px;
      }

      .today-label {
        margin: 0;
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--stage-current-text);
      }

      .today-task-name {
        font-size: 1rem;
        line-height: 1.5;
      }

      .today-task-kpi {
        margin: 0;
        color: #4b5563;
        font-size: 0.9rem;
      }

      .kgi-cards {
        display: grid;
        gap: 10px;
      }

      .kgi-card {
        border: 1px solid #dbe6fb;
        border-radius: 12px;
        padding: 12px;
        background: #fdfefe;
        display: grid;
        gap: 10px;
      }

      .kgi-card.is-low-priority {
        opacity: 0.78;
        background: #fafafa;
      }

      .kgi-card-head {
        display: grid;
        gap: 6px;
      }

      .kgi-name {
        margin: 0;
        font-size: 1.06rem;
        line-height: 1.4;
      }

      .kgi-summary {
        margin: 0;
        color: #334155;
        font-size: 0.92rem;
        line-height: 1.5;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .meta-row {
        margin: 0;
        color: #64748b;
        font-size: 0.84rem;
      }

      .meta-row.is-empty {
        color: #9ca3af;
      }

      .progress-group {
        display: grid;
        gap: 6px;
      }

      .progress-item {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        width: fit-content;
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 600;
      }

      .progress-item.is-done {
        background: #ecfdf5;
        color: #166534;
        border: 1px solid #bbf7d0;
      }

      .progress-item.is-active {
        background: #eff6ff;
        color: #1d4ed8;
        border: 1px solid #bfdbfe;
      }

      .progress-item.is-pending {
        background: #f8fafc;
        color: #475569;
        border: 1px solid #e2e8f0;
      }

      .next-action {
        margin: 0;
        padding: 8px 10px;
        border-radius: 8px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        color: #0f172a;
        font-size: 0.88rem;
      }

      .kgi-open {
        margin-top: 2px;
      }

      .empty {
        border: 1px solid #dbe6fb;
        border-radius: 12px;
        padding: 18px;
        background: #fff;
      }

      details.hint {
        margin-top: 10px;
      }

      pre {
        white-space: pre-wrap;
        font-size: 0.78rem;
      }

      @media (min-width: 700px) {
        body { padding: 24px; }
        .shell { padding: 20px; }
        .button { width: auto; }
      }
    </style>
  </head>
  <body class="page-stage-kgi">
    <main class="container">
      <section class="shell stage-shell">
        <h1 class="stage-main-title">KGI一覧</h1>

        <div class="top-actions">
          <a class="button" href="./index.html">新しいKGIを追加</a>
        </div>

        <p id="statusText" class="hint">読み込み中...</p>

        <section class="today-card" id="todayTaskSection" hidden>
          <p class="today-label">今日やること</p>
          <strong id="todayTaskName" class="today-task-name">-</strong>
          <p id="todayTaskKpi" class="today-task-kpi">対象KPI: -</p>
          <a id="todayTaskLink" class="button today-task-button" href="./list.html">このTaskを見る</a>
        </section>

        <section id="kgiCards" class="kgi-cards" hidden></section>

        <div id="emptyState" class="empty" hidden>まだKGIはありません。</div>

        <details id="listDebugPanel" class="hint" hidden>
          <summary>一覧デバッグ情報（暫定）</summary>
          <pre id="listDebugText">-</pre>
        </details>
      </section>
    </main>

    <script type="module" src="./list.js"></script>
  </body>
</html>
