<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>フェーズ詳細</title>
    <style>
      :root { color-scheme: light; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 16px;
        background: #f5f7fb;
        color: #111827;
      }
      .container { max-width: 760px; margin: 0 auto; display: grid; gap: 12px; }
      .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; }
      h1, h2 { margin: 0; }
      .hint { margin: 8px 0 0; color: #4b5563; font-size: 0.92rem; }
      .hint.error { color: #b91c1c; }
      .phase-meta { margin-top: 10px; display: grid; gap: 8px; }
      .phase-meta-item dt { font-size: 0.82rem; color: #6b7280; }
      .phase-meta-item dd { margin: 2px 0 0; }
      .kpi-list { list-style: none; margin: 10px 0 0; padding: 0; display: grid; gap: 10px; }
      .kpi-item { border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; background: #f9fafb; }
      .kpi-item h3 { margin: 0; font-size: 1rem; }
      .kpi-item p { margin: 6px 0 0; color: #4b5563; font-size: 0.92rem; }
      .kpi-link { color: #1d4ed8; text-decoration: none; }
      .kpi-link:hover { text-decoration: underline; }
      .field { margin-top: 10px; display: grid; gap: 6px; }
      label { font-size: 0.9rem; font-weight: 600; }
      input, textarea, button {
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 1rem;
        padding: 10px;
      }
      textarea { min-height: 74px; resize: vertical; }
      button { background: #2563eb; color: #fff; border: none; font-weight: 700; cursor: pointer; }
      button.secondary { background: #fff; color: #1d4ed8; border: 1px solid #bfdbfe; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .row-links { display: flex; flex-wrap: wrap; gap: 8px; }
      .row-links a {
        display: inline-flex;
        border: 1px solid #d1d5db;
        border-radius: 999px;
        padding: 8px 12px;
        text-decoration: none;
        color: #111827;
        background: #fff;
      }
      .candidate-list { list-style: none; margin: 12px 0 0; padding: 0; display: grid; gap: 10px; }
      .candidate-item { border: 1px solid #bfdbfe; border-radius: 10px; padding: 12px; background: #eff6ff; }
      .candidate-meta { font-size: 0.82rem; color: #1d4ed8; margin-top: 6px; }
      .candidate-actions { margin-top: 10px; display: flex; gap: 8px; }
    </style>
  </head>
  <body>
    <main class="container">
      <div class="row-links">
        <a id="backToKgiLink" href="./detail.html">KGI詳細に戻る</a>
      </div>

      <section class="card">
        <h1 id="phaseName">フェーズ詳細</h1>
        <p id="phaseStatus" class="hint">読み込み中...</p>
        <dl class="phase-meta" id="phaseMeta" hidden>
          <div class="phase-meta-item">
            <dt>フェーズの目的</dt>
            <dd id="phasePurpose">-</dd>
          </div>
          <div class="phase-meta-item">
            <dt>フェーズ期限</dt>
            <dd id="phaseDeadline">-</dd>
          </div>
        </dl>
      </section>

      <section class="card">
        <h2>AIでこのフェーズのKPIを作成</h2>
        <p class="hint">KGIとフェーズ情報からKPI候補を3〜5件作成します。</p>
        <button id="generateAiKpiButton" type="button" class="secondary">AIでこのフェーズのKPIを作成</button>
        <p id="aiGenerateStatus" class="hint"></p>
        <ul id="aiCandidateList" class="candidate-list" hidden></ul>
      </section>

      <section class="card">
        <h2>このフェーズに属するKPI一覧</h2>
        <p id="kpiStatus" class="hint">読み込み中...</p>
        <ul id="kpiList" class="kpi-list" hidden></ul>
      </section>

      <section class="card">
        <h2>KPI作成</h2>
        <p class="hint">このフェーズに紐づくKPIを追加します。</p>
        <div class="field">
          <label for="kpiNameInput">KPI名</label>
          <input id="kpiNameInput" type="text" placeholder="例: 初回相談予約を月20件" />
        </div>
        <div class="field">
          <label for="kpiDescriptionInput">KPI説明（任意）</label>
          <textarea id="kpiDescriptionInput" placeholder="補足説明を入力"></textarea>
        </div>
        <button id="createKpiButton" type="button">このフェーズにKPIを作成</button>
      </section>
    </main>

    <script type="module" src="./phase.js"></script>
  </body>
</html>
