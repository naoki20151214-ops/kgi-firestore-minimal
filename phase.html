<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>フェーズ別KPI | KGI Firestore Minimal</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 12px;
        background: #f5f7fb;
        color: #1f2937;
      }

      .container {
        width: 100%;
        margin: 0 auto;
        display: grid;
        gap: 16px;
      }

      .card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        padding: 16px;
      }

      .summary-card {
        text-align: center;
      }

      .kpi-summary-card {
        display: grid;
        gap: 16px;
      }

      .kpi-summary-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .kpi-summary-stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 12px;
      }

      .kpi-summary-stat {
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 12px;
        background: #f8fafc;
      }

      .kpi-summary-stat strong {
        display: block;
        color: #475569;
        margin-bottom: 6px;
        font-size: 0.88rem;
      }

      .kpi-summary-stat span {
        font-size: 1.4rem;
        font-weight: 800;
        color: #0f172a;
      }

      .kpi-management-panel[open] summary {
        margin-bottom: 16px;
      }

      .kpi-management-panel summary {
        cursor: pointer;
        font-weight: 700;
        color: #1f2937;
      }

      .kpi-management-grid {
        display: grid;
        gap: 16px;
      }

      .next-action-card {
        border: 1px solid #dbeafe;
        background: linear-gradient(180deg, #f8fbff 0%, #ffffff 100%);
      }

      .next-action-card h2 {
        margin-bottom: 14px;
      }

      .next-action-body {
        display: grid;
        gap: 10px;
      }

      .next-action-title {
        margin: 0;
        font-size: 1.15rem;
        font-weight: 800;
        color: #1e3a8a;
      }

      .next-action-empty {
        margin: 0;
        color: #475569;
      }

      .next-action-status-row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 72px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 0.82rem;
        font-weight: 700;
      }

      .status-badge.todo {
        background: #e2e8f0;
        color: #334155;
      }

      .status-badge.doing {
        background: #dbeafe;
        color: #1d4ed8;
      }

      .status-badge.ready {
        background: #ede9fe;
        color: #6d28d9;
      }

      .status-badge.done {
        background: #dcfce7;
        color: #15803d;
      }

      .next-action-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .button.success {
        background: #16a34a;
      }

      .button.ghost {
        background: #e2e8f0;
        color: #334155;
      }

      .next-action-inline-status {
        margin: 0;
        color: #475569;
        font-size: 0.92rem;
        font-weight: 600;
      }

      .next-action-step-panel {
        display: grid;
        gap: 8px;
        padding-top: 4px;
        border-top: 1px solid #dbeafe;
      }

      .next-action-step-title {
        margin: 0;
        font-size: 1rem;
        color: #1e3a8a;
      }

      .next-action-step-list {
        margin: 0;
        padding-left: 22px;
        display: grid;
        gap: 6px;
      }

      .next-action-step-list li {
        color: #1f2937;
      }

      .summary-label {
        margin: 0;
        color: #64748b;
        font-weight: 600;
      }

      .summary-value {
        margin: 4px 0 12px;
        font-size: clamp(2rem, 6vw, 3rem);
        font-weight: 800;
        color: #1d4ed8;
      }

      h1,
      h2 {
        margin: 0 0 12px;
      }

      .meta {
        display: grid;
        gap: 8px;
      }

      .deadline-highlight {
        margin-top: 6px;
        padding: 14px;
        border-radius: 12px;
        background: #eff6ff;
        border: 1px solid #bfdbfe;
        display: grid;
        gap: 4px;
      }

      .deadline-label {
        margin: 0;
        color: #1e3a8a;
        font-weight: 700;
      }

      .deadline-value {
        margin: 0;
        font-size: clamp(1.9rem, 8vw, 2.8rem);
        font-weight: 900;
        line-height: 1.1;
        color: #1d4ed8;
      }

      .deadline-date {
        margin: 0;
        color: #1e40af;
        font-size: 0.95rem;
      }

      .deadline-value.overdue,
      .overdue-text {
        color: #b91c1c;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .top-actions {
        display: grid;
        gap: 8px;
        margin: 8px 0 16px;
      }

      .top-actions-secondary {
        display: grid;
        gap: 8px;
        justify-content: start;
      }

      .button {
        display: inline-flex;
        width: 100%;
        align-items: center;
        justify-content: center;
        padding: 10px 14px;
        border-radius: 10px;
        background: #2563eb;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        border: none;
        cursor: pointer;
      }

      .button.secondary {
        background: #475569;
      }

      .button.attention {
        background: #ea580c;
      }

      .button.text {
        background: transparent;
        color: #2563eb;
        padding: 0;
      }

      .roadmap-kpi-actions {
        margin-top: 16px;
        display: grid;
        gap: 8px;
        justify-items: start;
      }

      .phase-description {
        display: grid;
        gap: 8px;
      }

      .phase-description-list {
        margin: 0;
        padding-left: 20px;
        display: grid;
        gap: 4px;
        color: #475569;
      }

      .phase-description-toggle {
        justify-self: start;
        font-size: 0.92rem;
      }

      .roadmap-phase-links {
        margin-top: 8px;
      }

      .roadmap-phase-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: #2563eb;
        font-size: 0.88rem;
        font-weight: 600;
        text-decoration: none;
      }

      .roadmap-phase-link:hover {
        text-decoration: underline;
      }

      .field {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
      }

      label {
        font-size: 0.92rem;
        font-weight: 600;
      }

      input,
      select {
        font-size: 1rem;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #d1d5db;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        text-align: left;
        padding: 10px;
        border-bottom: 1px solid #e5e7eb;
      }

      th {
        background: #eef2ff;
      }

      .hint {
        margin: 0;
        color: #6b7280;
        font-size: 0.9rem;
      }

      .hint.error {
        color: #b91c1c;
      }

      .progress-wrap {
        width: 100%;
        display: grid;
        gap: 4px;
      }

      .progress-bar {
        width: 100%;
        height: 10px;
        background: #e5e7eb;
        border-radius: 999px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #2563eb);
      }

      .progress-label {
        margin: 0;
        color: #475569;
        font-size: 0.85rem;
        text-align: right;
      }

      .kpi-progress-cell {
        min-width: 160px;
      }

      .section-title-with-note {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: baseline;
        flex-wrap: wrap;
      }

      .overview-grid,
      .location-grid,
      .roadmap-list {
        display: grid;
        gap: 12px;
      }

      .overview-grid {
        grid-template-columns: 1fr;
      }

      .overview-item,
      .location-card,
      .roadmap-phase-item {
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 14px;
        background: #f8fafc;
      }

      .overview-item strong,
      .location-card strong,
      .roadmap-phase-item strong {
        display: block;
        margin-bottom: 6px;
      }

      .overview-item.progress-item {
        grid-column: 1 / -1;
      }

      .roadmap-list {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .roadmap-phase-item {
        display: grid;
        gap: 6px;
      }

      .roadmap-phase-title-group {
        display: grid;
        gap: 6px;
      }

      .roadmap-phase-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }

      .roadmap-phase-status {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 72px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 0.82rem;
        font-weight: 700;
      }

      .roadmap-phase-status.done {
        background: #dcfce7;
        color: #15803d;
      }

      .roadmap-phase-status.current {
        background: #dbeafe;
        color: #1d4ed8;
      }

      .roadmap-phase-status.next {
        background: #ede9fe;
        color: #6d28d9;
      }

      .roadmap-phase-status.future,
      .roadmap-phase-status.unset {
        background: #e2e8f0;
        color: #334155;
      }

      .phase-title-row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .roadmap-phase-period,
      .phase-period-badge {
        display: inline-flex;
        width: fit-content;
        align-items: center;
        padding: 4px 10px;
        border-radius: 999px;
        background: #e0f2fe;
        color: #075985;
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.01em;
        line-height: 1.2;
      }

      .roadmap-phase-item.current {
        border-color: #93c5fd;
        background: #eff6ff;
      }

      .roadmap-phase-item.next {
        border-color: #c4b5fd;
      }

      .roadmap-phase-meta {
        color: #64748b;
        font-size: 0.9rem;
      }

      .phase-kpi-badge {
        display: inline-flex;
        width: fit-content;
        margin-top: 8px;
        padding: 4px 8px;
        border-radius: 999px;
        background: #eff6ff;
        color: #1d4ed8;
        font-size: 0.82rem;
        font-weight: 700;
      }


      .hint.info {
        color: #1d4ed8;
      }

      .kpi-group-list {
        display: grid;
        gap: 14px;
        margin-top: 12px;
      }

      .kpi-phase-group {
        border: 1px solid #dbeafe;
        border-radius: 12px;
        background: #f8fbff;
        overflow: hidden;
      }

      .kpi-phase-toggle {
        width: 100%;
        border: none;
        background: transparent;
        padding: 14px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        font: inherit;
      }

      .kpi-phase-title {
        font-size: 1rem;
        font-weight: 800;
        margin-right: 8px;
      }

      .kpi-phase-toggle-meta {
        color: #475569;
        font-size: 0.9rem;
        font-weight: 700;
      }

      .kpi-phase-body {
        display: grid;
        gap: 12px;
        padding: 0 16px 16px;
      }

      .kpi-card {
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        background: #ffffff;
        padding: 14px;
        display: grid;
        gap: 12px;
      }

      .kpi-card-summary,
      .kpi-card-detail,
      .kpi-card-detail-block {
        display: grid;
        gap: 10px;
      }

      .kpi-card-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 12px;
        color: #334155;
        font-size: 0.92rem;
      }

      .kpi-card-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .kpi-card-actions-secondary {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .kpi-card-actions-secondary .kpi-detail-toggle {
        background: #2563eb;
        color: #ffffff;
      }

      .kpi-category-badge,
      .kpi-status-badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 3px 8px;
        font-size: 0.8rem;
        font-weight: 700;
      }

      .kpi-category-badge {
        background: #dbeafe;
        color: #1d4ed8;
      }

      .kpi-status-badge {
        background: #e5e7eb;
        color: #475569;
      }

      .kpi-list-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .toolbar-toggle {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.92rem;
        color: #334155;
      }

      .kpi-detail-toggle {
        padding: 8px 12px;
      }

      .task-disclosure,
      .task-ai-panel {
        display: grid;
        gap: 10px;
      }

      .task-disclosure-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .task-disclosure-toggle {
        padding: 8px 12px;
      }

      .task-disclosure-body {
        display: grid;
        gap: 12px;
      }

      .kpi-card-detail[hidden],
      .task-disclosure-body[hidden] {
        display: none !important;
      }

      .task-panel-row td {
        background: #f8fafc;
      }

      .ai-actions {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }

      .button[disabled] {
        opacity: 0.7;
        cursor: wait;
      }

      .ai-suggestion-groups {
        display: grid;
        gap: 12px;
      }

      .ai-suggestion-group {
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 12px;
        background: #f8fafc;
      }

      .ai-suggestion-group h3 {
        margin: 0 0 10px;
        font-size: 1rem;
      }

      .ai-suggestion-list {
        margin: 0;
        padding-left: 18px;
        display: grid;
        gap: 10px;
      }

      @media (max-width: 640px) {
        .kpi-card {
          padding: 12px;
          gap: 10px;
        }

        .kpi-card-meta {
          gap: 6px 10px;
          font-size: 0.88rem;
        }

        .kpi-card-actions,
        .task-disclosure-header {
          align-items: flex-start;
        }

        .kpi-card-actions-secondary {
          width: 100%;
          flex-direction: column;
          align-items: stretch;
        }

        .kpi-card-actions-secondary .button {
          width: 100%;
          text-align: center;
        }
      }

      .ai-suggestion-item {
        display: grid;
        gap: 4px;
      }

      .ai-suggestion-item strong {
        font-size: 0.95rem;
      }

      .ai-suggestion-head {
        display: flex;
        gap: 12px;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
      }

      .ai-add-button {
        background: #2563eb;
      }

      .ai-add-button[disabled] {
        background: #94a3b8;
        cursor: default;
      }

      .ai-suggestion-meta {
        color: #475569;
        font-size: 0.92rem;
      }

      .task-panel {
        display: grid;
        gap: 12px;
      }

      .task-panel-title {
        margin: 0;
        font-size: 1rem;
      }

      .task-form {
        display: grid;
        gap: 10px;
      }

      .task-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .task-grid label {
        display: grid;
        gap: 6px;
      }

      .task-add-button {
        width: 100%;
      }

      .task-table th {
        background: #f1f5f9;
      }

      .task-ticket-meta {
        display: grid;
        gap: 6px;
        min-width: 220px;
      }

      .task-ticket-meta div {
        display: grid;
        gap: 2px;
      }

      .task-ticket-meta strong {
        color: #334155;
        font-size: 0.85rem;
      }

      .task-ticket-meta span {
        color: #475569;
        word-break: break-word;
      }

      .task-ticket-status-cell {
        display: grid;
        gap: 8px;
        min-width: 148px;
      }

      .task-ticket-status-select {
        min-width: 132px;
      }

      .task-ai-panel {
        display: grid;
        gap: 10px;
        padding: 12px;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        background: #f8fafc;
      }

      .task-ai-actions {
        margin-bottom: 0;
      }

      .task-ai-suggestions {
        display: grid;
        gap: 8px;
      }

      .task-check-row td {
        padding-top: 0;
        background: #f8fafc;
      }

      .task-check-panel {
        display: grid;
        gap: 12px;
        padding: 14px;
        border: 1px solid #dbeafe;
        border-radius: 10px;
        background: #ffffff;
      }

      .task-check-title {
        margin: 0;
        font-size: 1rem;
        color: #1e3a8a;
      }

      .task-check-field {
        display: grid;
        gap: 8px;
      }

      .task-check-label {
        font-size: 0.92rem;
        font-weight: 700;
        color: #334155;
      }

      .task-check-options {
        display: grid;
        gap: 8px;
      }

      .task-check-option {
        display: flex;
        gap: 8px;
        align-items: flex-start;
        font-weight: 500;
      }

      textarea {
        font-size: 1rem;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #d1d5db;
        resize: vertical;
        min-height: 88px;
      }

      .task-check-actions {
        display: flex;
        justify-content: flex-start;
      }

      .task-check-saved {
        display: grid;
        gap: 8px;
      }

      .task-check-badge {
        margin: 0;
        width: fit-content;
        padding: 4px 10px;
        border-radius: 999px;
        background: #dcfce7;
        color: #15803d;
        font-size: 0.82rem;
        font-weight: 700;
      }

      .task-check-saved-item {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      @media (min-width: 641px) {
        body {
          padding: 24px;
        }

        .container {
          max-width: 880px;
        }

        .row {
          grid-template-columns: 140px 1fr;
        }

        .top-actions-secondary {
          grid-template-columns: repeat(2, minmax(0, max-content));
          align-items: center;
        }

        .button {
          width: auto;
        }

        .overview-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .task-grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .task-add-button {
          width: fit-content;
        }

        .task-check-saved-item {
          grid-template-columns: 112px 1fr;
        }

        .kpi-card-actions {
          display: flex;
          justify-content: space-between;
          align-items: center;
          flex-wrap: wrap;
        }

        .kpi-card-actions-primary,
        .kpi-card-actions-secondary {
          display: flex;
          align-items: center;
          flex-wrap: wrap;
        }
      }

      @media (max-width: 640px) {
        .deadline-highlight {
          padding: 12px;
        }

        .deadline-value {
          font-size: clamp(2rem, 9vw, 2.6rem);
        }

        th,
        td {
          padding: 8px 6px;
          font-size: 0.9rem;
        }
      }
    </style>
  </head>
  <body data-page="phase">
    <main class="container">
      <div class="top-actions">
        <!-- 一時的に非表示: フェーズ別KPI画面では作業に不要なため残置 -->
        <!-- <a class="button" href="./index.html">新しいKGIを追加</a> -->
        <div class="top-actions-secondary">
          <a class="button secondary" id="backToDetailLink" href="./detail.html">KGIトップに戻る</a>
          <!-- 一時的に非表示: フェーズ別KPI画面では作業に不要なため残置 -->
          <!-- <a class="button secondary" href="./list.html">一覧に戻る</a> -->
        </div>
      </div>

      <section class="card">
        <h1 id="pageTitle">フェーズのKPI</h1>
        <p id="pageLead" class="hint">今表示しているフェーズのKPIを確認できます。</p>
        <p id="statusText" class="hint">読み込み中...</p>
        <div id="kgiMeta" class="meta" hidden></div>
      </section>

      <section class="card">
        <div class="section-title-with-note">
          <div>
            <div class="phase-title-row"><h2 id="phaseTitle">フェーズ情報</h2><span id="phasePeriodBadge" class="phase-period-badge" hidden></span></div>
            <div id="phaseDescription" class="phase-description">
              <p class="hint">読み込み中...</p>
            </div>
          </div>
          <p id="phaseMetaText" class="hint"></p>
        </div>
      </section>

      <section class="card kpi-summary-card">
        <div class="kpi-summary-header">
          <div>
            <h2>このフェーズのKPIサマリー</h2>
            <p class="hint">このページでは選択したフェーズのKPIだけを管理します。</p>
          </div>
        </div>
        <div id="kpiSummaryStats" class="kpi-summary-stats">
          <div class="kpi-summary-stat">
            <strong>表示中KPI</strong>
            <span>0件</span>
          </div>
        </div>
        <p id="kpiStatusText" class="hint">読み込み中...</p>
      </section>

      <section class="card">
        <details id="kpiManagementPanel" class="kpi-management-panel" open>
          <summary>このフェーズのKPI詳細・追加・アーカイブ操作</summary>
          <div class="kpi-management-grid">
            <section>
              <h2>KPIを追加</h2>
              <div class="field">
                <label for="kpiName">KPI名</label>
                <input id="kpiName" type="text" placeholder="例: 問い合わせ件数" />
              </div>
              <div class="field">
                <label for="kpiDescription">補足説明</label>
                <input id="kpiDescription" type="text" placeholder="任意" />
              </div>
              <div class="field">
                <label for="kpiType">KPIタイプ</label>
                <select id="kpiType">
                  <option value="result">result</option>
                  <option value="action">action</option>
                </select>
              </div>
              <div class="field">
                <label for="kpiCategory">カテゴリ</label>
                <select id="kpiCategory">
                  <option value="">自動推定</option>
                  <option value="research">research</option>
                  <option value="design">design</option>
                  <option value="build">build</option>
                  <option value="quality">quality</option>
                  <option value="validation">validation</option>
                  <option value="distribution">distribution</option>
                  <option value="monetization">monetization</option>
                </select>
              </div>
              <div class="field">
                <label for="kpiDeadline">期限</label>
                <input id="kpiDeadline" type="date" />
              </div>
              <button id="addKpiButton" class="button" type="button">KPIを保存</button>
            </section>

            <section>
              <h2>KPI一覧</h2>
              <p class="hint">選択したフェーズのKPIだけを表示しています。</p>
              <div class="kpi-list-toolbar">
                <label class="toolbar-toggle" for="showArchivedToggle">
                  <input id="showArchivedToggle" type="checkbox" />
                  アーカイブ済みを表示
                </label>
              </div>
              <div id="kpiTable" class="kpi-group-list" hidden>
                <div id="kpiTableBody"></div>
              </div>
            </section>
          </div>
        </details>
      </section>
    </main>

    <script type="module" src="./detail.js"></script>
  </body>
</html>
