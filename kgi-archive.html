<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KGI削除確認</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 14px;
        background: #f8fafc;
        color: #0f172a;
      }

      .container {
        max-width: 680px;
        margin: 0 auto;
        display: grid;
        gap: 12px;
      }

      .card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 14px;
        display: grid;
        gap: 10px;
      }

      .danger {
        border-color: #fecaca;
        background: #fff7f7;
      }

      .button-row {
        display: grid;
        gap: 8px;
      }

      .button {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        min-height: 48px;
        border: 1px solid transparent;
        border-radius: 999px;
        padding: 10px 16px;
        font-size: 1rem;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }

      .button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      .button.primary { background: #dc2626; color: #fff; }
      .button.secondary { background: #eef2ff; color: #1e3a8a; }

      .hint { margin: 0; color: #64748b; }
      .hint.error { color: #b91c1c; }

      .debug {
        font-size: 0.82rem;
        color: #334155;
        border-top: 1px dashed #cbd5e1;
        padding-top: 8px;
      }

      .debug dl {
        margin: 0;
        display: grid;
        grid-template-columns: minmax(120px, auto) 1fr;
        gap: 4px 8px;
      }

      .debug dt { font-weight: 700; }
      .debug dd { margin: 0; word-break: break-all; }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>KGI削除確認</h1>
        <p id="statusText" class="hint">読み込み中...</p>
        <p><strong>KGI名:</strong> <span id="kgiName">-</span></p>
      </section>

      <section class="card danger">
        <p>この操作を実行すると、このKGIは一覧から非表示になります（アーカイブ）。</p>
        <div class="button-row">
          <button id="archiveButton" class="button primary" type="button">削除する</button>
          <a id="cancelButton" class="button secondary" href="./detail.html">キャンセル</a>
        </div>
        <p id="resultText" class="hint"></p>

        <section class="debug" aria-label="archive debug">
          <dl>
            <dt>targetKgiId</dt><dd id="archiveDebugTargetKgiId">-</dd>
            <dt>targetCollectionPath</dt><dd id="archiveDebugTargetCollectionPath">kgis</dd>
            <dt>archiveWriteStarted</dt><dd id="archiveDebugWriteStarted">false</dd>
            <dt>archiveWriteSucceeded</dt><dd id="archiveDebugWriteSucceeded">false</dd>
            <dt>archiveVerifySucceeded</dt><dd id="archiveDebugVerifySucceeded">false</dd>
            <dt>lastErrorMessage</dt><dd id="archiveDebugLastErrorMessage">-</dd>
          </dl>
        </section>
      </section>
    </main>

    <script type="module" src="./kgi-archive.js"></script>
  </body>
</html>
