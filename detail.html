<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KGI詳細</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 24px;
        background: #f5f7fb;
        color: #1f2937;
      }

      .container {
        width: min(96vw, 880px);
        margin: 0 auto;
        display: grid;
        gap: 16px;
      }

      .card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        padding: 16px;
      }

      .summary-card {
        text-align: center;
      }

      .summary-label {
        margin: 0;
        color: #64748b;
        font-weight: 600;
      }

      .summary-value {
        margin: 4px 0 12px;
        font-size: clamp(2rem, 6vw, 3rem);
        font-weight: 800;
        color: #1d4ed8;
      }

      h1,
      h2 {
        margin: 0 0 12px;
      }

      .meta {
        display: grid;
        gap: 8px;
      }

      .row {
        display: grid;
        grid-template-columns: 140px 1fr;
        gap: 8px;
      }

      .top-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .button {
        display: inline-block;
        padding: 10px 14px;
        border-radius: 10px;
        background: #2563eb;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        border: none;
        cursor: pointer;
      }

      .button.secondary {
        background: #475569;
      }

      .field {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
      }

      label {
        font-size: 0.92rem;
        font-weight: 600;
      }

      input {
        font-size: 1rem;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #d1d5db;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        text-align: left;
        padding: 10px;
        border-bottom: 1px solid #e5e7eb;
      }

      th {
        background: #eef2ff;
      }

      .hint {
        margin: 0;
        color: #6b7280;
        font-size: 0.9rem;
      }

      .hint.error {
        color: #b91c1c;
      }

      .progress-cell {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .progress-input {
        width: 96px;
      }

      .progress-wrap {
        width: 100%;
        display: grid;
        gap: 4px;
      }

      .progress-bar {
        width: 100%;
        height: 10px;
        background: #e5e7eb;
        border-radius: 999px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #2563eb);
      }

      .progress-label {
        margin: 0;
        color: #475569;
        font-size: 0.85rem;
        text-align: right;
      }

      .kpi-progress-cell {
        min-width: 160px;
      }

      @media (max-width: 640px) {
        body {
          padding: 12px;
        }

        .row {
          grid-template-columns: 1fr;
        }

        .progress-cell {
          flex-direction: column;
          align-items: stretch;
        }

        .progress-input {
          width: 100%;
        }

        th,
        td {
          padding: 8px 6px;
          font-size: 0.9rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <div class="top-actions">
        <a class="button secondary" href="./list.html">一覧に戻る</a>
        <a class="button" href="./index.html">新しいKGIを追加</a>
      </div>

      <section class="card">
        <h1>KGI詳細</h1>
        <p id="statusText" class="hint">読み込み中...</p>
        <div id="kgiMeta" class="meta" hidden></div>
      </section>

      <section class="card summary-card">
        <p class="summary-label">KGI全体進捗</p>
        <p id="overallProgressValue" class="summary-value">0%</p>
        <div class="progress-wrap">
          <div class="progress-bar" aria-label="KGI全体進捗バー">
            <div id="overallProgressFill" class="progress-fill"></div>
          </div>
          <p id="overallProgressCaption" class="progress-label">KPIがありません</p>
        </div>
      </section>

      <section class="card">
        <h2>KPIを追加</h2>
        <div class="field">
          <label for="kpiName">KPI名</label>
          <input id="kpiName" type="text" placeholder="例: 問い合わせ件数" />
        </div>
        <div class="field">
          <label for="kpiTarget">KPI目標値</label>
          <input id="kpiTarget" type="number" placeholder="例: 200" />
        </div>
        <div class="field">
          <label for="kpiProgress">初期進捗</label>
          <input id="kpiProgress" type="number" value="0" />
        </div>
        <button id="addKpiButton" class="button" type="button">KPIを保存</button>
      </section>

      <section class="card">
        <h2>KPI一覧（進捗更新つき）</h2>
        <p id="kpiStatusText" class="hint">読み込み中...</p>
        <table id="kpiTable" hidden>
          <thead>
            <tr>
              <th>name</th>
              <th>current / target</th>
              <th>進捗率</th>
              <th>更新</th>
              <th>updatedAt</th>
            </tr>
          </thead>
          <tbody id="kpiTableBody"></tbody>
        </table>
      </section>
    </main>

    <script type="module" src="./detail.js"></script>
  </body>
</html>
