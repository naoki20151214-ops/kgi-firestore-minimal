<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KGI詳細（俯瞰）</title>
    <link rel="stylesheet" href="./readable-text.css" />
    <style>
      :root { color-scheme: light; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 16px;
        background: #f5f7fb;
        color: #111827;
      }
      .container {
        max-width: 720px;
        margin: 0 auto;
        display: grid;
        gap: 12px;
      }
      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 16px;
      }
      h1 { margin: 0 0 10px; font-size: clamp(1.3rem, 1.18rem + 0.6vw, 1.65rem); line-height: 1.35; }
      h2 { margin: 0; font-size: clamp(1.08rem, 1.02rem + 0.25vw, 1.2rem); }
      dl { margin: 0; display: grid; gap: 16px; }
      dt { font-size: 0.86rem; color: #374151; font-weight: 700; letter-spacing: 0.02em; margin-bottom: 6px; }
      dd { margin: 0; }
      .back-link {
        display: inline-block;
        margin-top: 8px;
        padding: 10px 14px;
        border-radius: 10px;
        text-decoration: none;
        border: 1px solid #d1d5db;
        color: #111827;
        background: #fff;
      }
      .status { margin: 0; font-size: 0.95rem; color: #374151; }
      .status.error { color: #b91c1c; }
      .roadmap-list { margin: 0; padding-left: 20px; display: grid; gap: 12px; }
      .roadmap-title-link {
        font-weight: 700;
        color: #1d4ed8;
        text-decoration: none;
      }
      .roadmap-title-link:hover { text-decoration: underline; }
      .roadmap-description {
        margin: 8px 0 0;
      }
      .roadmap-deadline {
        margin: 10px 0 0;
        font-size: 0.9rem;
        color: #6b7280;
      }
      .roadmap-empty { margin: 0; color: #6b7280; font-size: 0.92rem; }
      .kpi-summary-inline {
        margin: 8px 0 0;
        font-size: 0.98rem;
        line-height: 1.75;
        color: #4b5563;
      }
      @media (max-width: 640px) {
        body { padding: 14px; }
        .card { padding: 14px; }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1 id="kgiName">KGI詳細</h1>
        <p id="statusText" class="status">読み込み中...</p>
        <dl id="detailFields" hidden>
          <div>
            <dt>ゴール説明</dt>
            <dd id="goalDescription" data-readable data-lines="3">-</dd>
          </div>
          <div>
            <dt>開始日</dt>
            <dd id="startDate">-</dd>
          </div>
          <div>
            <dt>目標期限日</dt>
            <dd id="targetDate">-</dd>
          </div>
        </dl>
      </section>

      <section class="card" id="roadmapSection" hidden>
        <h2>ロードマップ</h2>
        <ol id="roadmapList" class="roadmap-list"></ol>
        <p id="roadmapEmpty" class="roadmap-empty" hidden>ロードマップは未設定です。</p>
      </section>

      <section class="card" id="kpiSummarySection" hidden>
        <h2>KPIサマリー（最小表示）</h2>
        <p id="kpiSummaryText" class="kpi-summary-inline">-</p>
      </section>

      <a class="back-link" href="./list.html">一覧に戻る</a>
    </main>

    <script type="module" src="./detail.js"></script>
  </body>
</html>
