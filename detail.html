<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KGI詳細</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 24px;
        background: #f5f7fb;
        color: #1f2937;
      }

      .container {
        width: min(96vw, 880px);
        margin: 0 auto;
        display: grid;
        gap: 16px;
      }

      .card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        padding: 16px;
      }

      .summary-card {
        text-align: center;
      }

      .summary-label {
        margin: 0;
        color: #64748b;
        font-weight: 600;
      }

      .summary-value {
        margin: 4px 0 12px;
        font-size: clamp(2rem, 6vw, 3rem);
        font-weight: 800;
        color: #1d4ed8;
      }

      h1,
      h2 {
        margin: 0 0 12px;
      }

      .meta {
        display: grid;
        gap: 8px;
      }

      .deadline-highlight {
        margin-top: 6px;
        padding: 14px;
        border-radius: 12px;
        background: #eff6ff;
        border: 1px solid #bfdbfe;
        display: grid;
        gap: 4px;
      }

      .deadline-label {
        margin: 0;
        color: #1e3a8a;
        font-weight: 700;
      }

      .deadline-value {
        margin: 0;
        font-size: clamp(1.9rem, 8vw, 2.8rem);
        font-weight: 900;
        line-height: 1.1;
        color: #1d4ed8;
      }

      .deadline-date {
        margin: 0;
        color: #1e40af;
        font-size: 0.95rem;
      }

      .deadline-value.overdue,
      .overdue-text {
        color: #b91c1c;
      }

      .row {
        display: grid;
        grid-template-columns: 140px 1fr;
        gap: 8px;
      }

      .top-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .button {
        display: inline-block;
        padding: 10px 14px;
        border-radius: 10px;
        background: #2563eb;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        border: none;
        cursor: pointer;
      }

      .button.secondary {
        background: #475569;
      }

      .field {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
      }

      label {
        font-size: 0.92rem;
        font-weight: 600;
      }

      input,
      select {
        font-size: 1rem;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #d1d5db;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        text-align: left;
        padding: 10px;
        border-bottom: 1px solid #e5e7eb;
      }

      th {
        background: #eef2ff;
      }

      .hint {
        margin: 0;
        color: #6b7280;
        font-size: 0.9rem;
      }

      .hint.error {
        color: #b91c1c;
      }

      .progress-wrap {
        width: 100%;
        display: grid;
        gap: 4px;
      }

      .progress-bar {
        width: 100%;
        height: 10px;
        background: #e5e7eb;
        border-radius: 999px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #2563eb);
      }

      .progress-label {
        margin: 0;
        color: #475569;
        font-size: 0.85rem;
        text-align: right;
      }

      .kpi-progress-cell {
        min-width: 160px;
      }

      .task-panel-row td {
        background: #f8fafc;
      }

      .ai-actions {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }

      .button[disabled] {
        opacity: 0.7;
        cursor: wait;
      }

      .ai-suggestion-groups {
        display: grid;
        gap: 12px;
      }

      .ai-suggestion-group {
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 12px;
        background: #f8fafc;
      }

      .ai-suggestion-group h3 {
        margin: 0 0 10px;
        font-size: 1rem;
      }

      .ai-suggestion-list {
        margin: 0;
        padding-left: 18px;
        display: grid;
        gap: 10px;
      }

      .ai-suggestion-item {
        display: grid;
        gap: 4px;
      }

      .ai-suggestion-item strong {
        font-size: 0.95rem;
      }

      .ai-suggestion-head {
        display: flex;
        gap: 12px;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
      }

      .ai-add-button {
        background: #2563eb;
      }

      .ai-add-button[disabled] {
        background: #94a3b8;
        cursor: default;
      }

      .ai-suggestion-meta {
        color: #475569;
        font-size: 0.92rem;
      }

      .task-panel {
        display: grid;
        gap: 12px;
      }

      .task-panel-title {
        margin: 0;
        font-size: 1rem;
      }

      .task-form {
        display: grid;
        gap: 10px;
      }

      .task-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .task-grid label {
        display: grid;
        gap: 6px;
      }

      .task-add-button {
        width: fit-content;
      }

      .task-table th {
        background: #f1f5f9;
      }

      .task-ai-panel {
        display: grid;
        gap: 10px;
        padding: 12px;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        background: #f8fafc;
      }

      .task-ai-actions {
        margin-bottom: 0;
      }

      .task-ai-suggestions {
        display: grid;
        gap: 8px;
      }

      @media (max-width: 640px) {
        body {
          padding: 12px;
        }

        .row {
          grid-template-columns: 1fr;
        }

        .deadline-highlight {
          padding: 12px;
        }

        .deadline-value {
          font-size: clamp(2rem, 9vw, 2.6rem);
        }

        th,
        td {
          padding: 8px 6px;
          font-size: 0.9rem;
        }

        .task-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <div class="top-actions">
        <a class="button secondary" href="./list.html">一覧に戻る</a>
        <a class="button" href="./index.html">新しいKGIを追加</a>
      </div>

      <section class="card">
        <h1>KGI詳細</h1>
        <p id="statusText" class="hint">読み込み中...</p>
        <div id="kgiMeta" class="meta" hidden></div>
      </section>

      <section class="card summary-card">
        <p class="summary-label">KGI全体進捗</p>
        <p id="overallProgressValue" class="summary-value">0%</p>
        <div class="progress-wrap">
          <div class="progress-bar" aria-label="KGI全体進捗バー">
            <div id="overallProgressFill" class="progress-fill"></div>
          </div>
          <p id="overallProgressCaption" class="progress-label">KPIがありません</p>
        </div>
      </section>

      <section class="card">
        <h2>KPIを追加</h2>
        <div class="field">
          <label for="kpiName">KPI名</label>
          <input id="kpiName" type="text" placeholder="例: 問い合わせ件数" />
        </div>
        <div class="field">
          <label for="kpiDescription">補足説明</label>
          <input id="kpiDescription" type="text" placeholder="任意" />
        </div>
        <div class="field">
          <label for="kpiType">KPIタイプ</label>
          <select id="kpiType">
            <option value="result">result</option>
            <option value="action">action</option>
          </select>
        </div>
        <div class="field">
          <label for="kpiDeadline">期限</label>
          <input id="kpiDeadline" type="date" />
        </div>
        <button id="addKpiButton" class="button" type="button">KPIを保存</button>
      </section>

      <section class="card">
        <h2>AIでKPI案を作る</h2>
        <div class="ai-actions">
          <button id="generateAiKpisButton" class="button" type="button">AIでKPI案を作る</button>
          <p id="aiLoadingText" class="hint" hidden>AIがKPI案を作成中...</p>
        </div>
        <p id="aiErrorText" class="hint error" hidden></p>
        <div id="aiSuggestions" class="ai-suggestion-groups" hidden>
          <section class="ai-suggestion-group">
            <h3>結果KPI候補</h3>
            <div id="resultKpiSuggestions"></div>
          </section>
          <section class="ai-suggestion-group">
            <h3>行動KPI候補</h3>
            <div id="actionKpiSuggestions"></div>
          </section>
          <section class="ai-suggestion-group">
            <h3>サブKGI候補</h3>
            <div id="subKgiSuggestions"></div>
          </section>
        </div>
      </section>

      <section class="card">
        <h2>KPI一覧</h2>
        <p id="kpiStatusText" class="hint">読み込み中...</p>
        <table id="kpiTable" hidden>
          <thead>
            <tr>
              <th>KPI名</th>
              <th>補足説明</th>
              <th>KPIタイプ</th>
              <th>現在値(自動集計)</th>
              <th>進捗率</th>
              <th>期限</th>
              <th>残り日数</th>
            </tr>
          </thead>
          <tbody id="kpiTableBody"></tbody>
        </table>
      </section>
    </main>


    <script type="module" src="./detail.js"></script>
  </body>
</html>
