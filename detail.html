<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KGI詳細（軽量版）</title>
    <style>
      :root { color-scheme: light; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 16px;
        background: #f5f7fb;
        color: #111827;
      }
      .container {
        max-width: 720px;
        margin: 0 auto;
        display: grid;
        gap: 12px;
      }
      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 16px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.3rem;
      }
      dl {
        margin: 0;
        display: grid;
        gap: 10px;
      }
      dt {
        font-size: 0.82rem;
        color: #6b7280;
        margin-bottom: 2px;
      }
      dd {
        margin: 0;
        font-size: 1rem;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .back-link {
        display: inline-block;
        margin-top: 8px;
        padding: 10px 14px;
        border-radius: 10px;
        text-decoration: none;
        border: 1px solid #d1d5db;
        color: #111827;
        background: #fff;
      }
      .status {
        margin: 0;
        font-size: 0.95rem;
        color: #374151;
      }
      .status.error {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1 id="kgiName">KGI詳細</h1>
        <p id="statusText" class="status">読み込み中...</p>
        <dl id="detailFields" hidden>
          <div>
            <dt>ゴール説明</dt>
            <dd id="goalDescription">-</dd>
          </div>
          <div>
            <dt>開始日</dt>
            <dd id="startDate">-</dd>
          </div>
          <div>
            <dt>目標期限日</dt>
            <dd id="targetDate">-</dd>
          </div>
        </dl>
        <a class="back-link" href="./list.html">一覧に戻る</a>
      </section>
    </main>

    <script type="module" src="./detail.js"></script>
  </body>
</html>
