<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KGI詳細（俯瞰）</title>
    <link rel="stylesheet" href="./readable-text.css" />
    <style>
      :root { color-scheme: light; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 16px;
        background: #f5f7fb;
        color: #111827;
      }
      .container {
        max-width: 720px;
        margin: 0 auto;
        display: grid;
        gap: 12px;
      }
      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 16px;
      }
      h1 { margin: 0 0 10px; font-size: clamp(1.3rem, 1.18rem + 0.6vw, 1.65rem); line-height: 1.35; }
      h2 { margin: 0; font-size: clamp(1.08rem, 1.02rem + 0.25vw, 1.2rem); }
      dl { margin: 0; display: grid; gap: 16px; }
      dt { font-size: 0.86rem; color: #374151; font-weight: 700; letter-spacing: 0.02em; margin-bottom: 6px; }
      dd { margin: 0; }
      .back-link {
        display: inline-block;
        margin-top: 8px;
        padding: 10px 14px;
        border-radius: 10px;
        text-decoration: none;
        border: 1px solid #d1d5db;
        color: #111827;
        background: #fff;
      }
      .status { margin: 0; font-size: 0.95rem; color: #374151; }
      .status.error { color: #b91c1c; }
      .roadmap-list { margin: 0; padding-left: 20px; display: grid; gap: 12px; }
      .roadmap-item details {
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        background: #f9fafb;
      }
      .roadmap-item summary {
        cursor: pointer;
        list-style: none;
        padding: 12px;
      }
      .roadmap-item summary::-webkit-details-marker { display: none; }
      .roadmap-item summary::before {
        content: "▶";
        margin-right: 8px;
        font-size: 0.82rem;
        color: #4b5563;
      }
      .roadmap-item details[open] > summary::before { content: "▼"; }
      .roadmap-summary-title {
        font-weight: 700;
        color: #111827;
      }
      .roadmap-summary-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .roadmap-status-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        font-size: 0.74rem;
        font-weight: 700;
        padding: 3px 9px;
        border: 1px solid #cbd5e1;
        color: #334155;
        background: #f8fafc;
        white-space: nowrap;
      }
      .roadmap-status-badge.is-empty {
        border-color: #d1d5db;
        color: #4b5563;
        background: #f9fafb;
      }
      .roadmap-status-badge.is-draft {
        border-color: #bfdbfe;
        color: #1d4ed8;
        background: #eff6ff;
      }
      .roadmap-status-badge.is-cleanup-needed {
        border-color: #fde68a;
        color: #92400e;
        background: #fffbeb;
      }
      .roadmap-status-badge.is-finalized {
        border-color: #bbf7d0;
        color: #166534;
        background: #f0fdf4;
      }
      .roadmap-summary-intro {
        margin-top: 6px;
        font-size: 0.93rem;
        color: #4b5563;
        line-height: 1.6;
      }
      .roadmap-summary-deadline {
        margin-top: 6px;
        font-size: 0.88rem;
        color: #6b7280;
      }
      .roadmap-body {
        padding: 0 12px 12px;
      }
      .roadmap-description {
        margin: 0;
        white-space: pre-wrap;
        line-height: 1.8;
        color: #1f2937;
      }
      .roadmap-title-link {
        display: inline-block;
        margin-top: 10px;
        color: #1d4ed8;
        text-decoration: none;
        font-weight: 600;
      }
      .roadmap-title-link:hover { text-decoration: underline; }
      .roadmap-empty { margin: 0; color: #6b7280; font-size: 0.92rem; }
      .kpi-summary-inline {
        margin: 8px 0 0;
        font-size: 0.98rem;
        line-height: 1.75;
        color: #4b5563;
      }
      .overview-panel { display: grid; gap: 12px; }
      .overview-summary-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
      .overview-summary-card {
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        background: #f9fafb;
        padding: 10px 12px;
      }
      .overview-summary-label {
        margin: 0;
        font-size: 0.78rem;
        color: #6b7280;
        line-height: 1.4;
      }
      .overview-summary-value {
        margin: 4px 0 0;
        font-size: 1.05rem;
        font-weight: 700;
        color: #111827;
      }
      .overview-next {
        border: 1px solid #bfdbfe;
        background: #eff6ff;
        color: #1e3a8a;
        border-radius: 10px;
        padding: 10px 12px;
      }
      .overview-next-title {
        margin: 0;
        font-size: 0.82rem;
        font-weight: 700;
      }
      .overview-next-body {
        margin: 6px 0 0;
        font-size: 0.93rem;
        line-height: 1.6;
      }
      .overview-phase-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 10px;
      }
      .overview-phase-item {
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        background: #ffffff;
        padding: 10px 12px;
        display: grid;
        gap: 8px;
      }
      .overview-phase-header {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
      }
      .overview-phase-title-wrap {
        min-width: 0;
      }
      .overview-phase-number {
        margin: 0;
        font-size: 0.78rem;
        color: #6b7280;
      }
      .overview-phase-title {
        margin: 2px 0 0;
        font-size: 0.96rem;
        font-weight: 700;
        color: #111827;
        line-height: 1.45;
      }
      .overview-phase-meta {
        margin: 0;
        display: grid;
        gap: 4px;
        font-size: 0.86rem;
        color: #4b5563;
      }
      .overview-phase-deadline.is-muted { color: #9ca3af; }

      .now-action-card {
        border: 1px solid #c7d2fe;
        border-radius: 12px;
        background: #eef2ff;
        padding: 12px;
        display: grid;
        gap: 10px;
      }
      .now-action-title {
        margin: 0;
        font-size: 0.95rem;
        font-weight: 700;
        color: #1e3a8a;
      }
      .now-action-meta {
        margin: 0;
        font-size: 0.82rem;
        color: #475569;
      }
      .now-action-body {
        margin: 0;
        font-size: 0.94rem;
        line-height: 1.65;
        color: #1e293b;
      }
      .now-action-button {
        justify-self: start;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 10px 14px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 700;
        font-size: 0.92rem;
        color: #ffffff;
        background: #2563eb;
      }
      .now-action-button:hover {
        background: #1d4ed8;
      }
      @media (max-width: 640px) {
        body { padding: 14px; }
        .card { padding: 14px; }
        .overview-summary-grid {
          grid-template-columns: minmax(0, 1fr);
        }
        .now-action-button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1 id="kgiName">KGI詳細</h1>
        <p id="statusText" class="status">読み込み中...</p>
        <dl id="detailFields" hidden>
          <div>
            <dt>ゴール説明</dt>
            <dd id="goalDescription" data-readable data-lines="3">-</dd>
          </div>
          <div>
            <dt>開始日</dt>
            <dd id="startDate">-</dd>
          </div>
          <div>
            <dt>目標期限日</dt>
            <dd id="targetDate">-</dd>
          </div>
        </dl>
      </section>

      <section class="card" id="overviewSection" hidden>
        <h2>進捗の全体図</h2>
        <div class="overview-panel">
          <div id="overviewSummaryGrid" class="overview-summary-grid"></div>
          <div id="overviewNext" class="overview-next" hidden>
            <p class="overview-next-title">今すすめる候補</p>
            <p id="overviewNextText" class="overview-next-body">-</p>
          </div>
          <div id="nowActionCard" class="now-action-card" hidden>
            <p class="now-action-title">今やること</p>
            <p id="nowActionMeta" class="now-action-meta">-</p>
            <p id="nowActionText" class="now-action-body">-</p>
            <a id="nowActionLink" class="now-action-button" href="#" hidden>今やることへ進む</a>
          </div>
          <ul id="overviewPhaseList" class="overview-phase-list"></ul>
        </div>
      </section>

      <section class="card" id="roadmapSection" hidden>
        <h2>ロードマップ</h2>
        <ol id="roadmapList" class="roadmap-list"></ol>
        <p id="roadmapEmpty" class="roadmap-empty" hidden>ロードマップは未設定です。</p>
      </section>

      <section class="card" id="kpiSummarySection" hidden>
        <h2>KPIサマリー（最小表示）</h2>
        <p id="kpiSummaryText" class="kpi-summary-inline">-</p>
      </section>

      <a class="back-link" href="./list.html">一覧に戻る</a>
    </main>

    <script type="module" src="./detail.js"></script>
  </body>
</html>
