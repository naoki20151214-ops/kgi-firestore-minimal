<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KPI詳細</title>
    <style>
      :root { color-scheme: light; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 16px;
        background: #f5f7fb;
        color: #111827;
      }
      .container { max-width: 760px; margin: 0 auto; display: grid; gap: 12px; }
      .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; }
      .row-links { display: flex; flex-wrap: wrap; gap: 8px; }
      .row-links a {
        display: inline-flex;
        border: 1px solid #d1d5db;
        border-radius: 999px;
        padding: 8px 12px;
        text-decoration: none;
        color: #111827;
        background: #fff;
      }
      h1 { margin: 0; font-size: 1.2rem; }
      dl { margin: 10px 0 0; display: grid; gap: 8px; }
      dt { font-size: 0.82rem; color: #6b7280; }
      dd { margin: 2px 0 0; }
      .hint { margin: 8px 0 0; color: #4b5563; font-size: 0.92rem; }
      .task-entry-link {
        display: inline-flex;
        margin-top: 8px;
        text-decoration: none;
        border-radius: 8px;
        padding: 10px 12px;
        background: #2563eb;
        color: #fff;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <div class="row-links">
        <a id="backToPhaseLink" href="./phase.html">フェーズ詳細に戻る</a>
      </div>

      <section class="card">
        <h1 id="kpiTitle">KPI詳細</h1>
        <p id="kpiStatus" class="hint">読み込み中...</p>
        <dl id="kpiMeta" hidden>
          <div>
            <dt>KPI説明</dt>
            <dd id="kpiDescription">-</dd>
          </div>
          <div>
            <dt>進捗</dt>
            <dd id="kpiProgress">-</dd>
          </div>
        </dl>
        <a id="taskManageLink" class="task-entry-link" href="#">このKPIでタスク管理へ進む</a>
      </section>
    </main>

    <script type="module" src="./kpi.js"></script>
  </body>
</html>
